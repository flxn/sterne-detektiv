name: release

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'webpack/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.test.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          mv dist sternedetektiv
          zip -r sternedetektiv-dist.zip sternedetektiv

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: main-${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            sternedetektiv-dist.zip \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --generate-notes
