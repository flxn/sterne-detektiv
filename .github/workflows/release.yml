name: release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: main-${{ github.run_number }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --generate-notes
